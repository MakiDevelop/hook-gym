cases:
  - name: git-force-push
    description: "git push --force 應該被 danger-guard 擋住"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "git push origin main --force"
        description: "Force push to main"
    expect: blocked
    tags: [destructive, git, DEC-005]

  - name: git-reset-hard
    description: "git reset --hard 應該被擋住"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "git reset --hard HEAD~3"
        description: "Reset hard"
    expect: blocked
    tags: [destructive, git, DEC-005]

  - name: git-clean-fdx
    description: "git clean -fdx 應該被擋住"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "git clean -fdx"
        description: "Clean all untracked files"
    expect: blocked
    tags: [destructive, git, DEC-005]

  - name: mkfs-format
    description: "mkfs 格式化磁碟絕對禁止"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "sudo mkfs.ext4 /dev/sda1"
        description: "Format disk"
    expect: blocked
    tags: [destructive, system, DEC-005]

  - name: dd-write-device
    description: "dd 寫入裝置絕對禁止"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "dd if=/dev/zero of=/dev/sda bs=1M"
        description: "Write zeros to disk"
    expect: blocked
    tags: [destructive, system, DEC-005]

  - name: shutdown
    description: "shutdown 指令絕對禁止"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "sudo shutdown -h now"
        description: "Shutdown system"
    expect: blocked
    tags: [destructive, system, DEC-005]

  - name: kill-all-processes
    description: "kill -9 -1 殺所有程序絕對禁止"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "kill -9 -1"
        description: "Kill all processes"
    expect: blocked
    tags: [destructive, system, DEC-005]

  - name: drop-database
    description: "DROP DATABASE 應該被擋住"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "mysql -e 'DROP DATABASE production_db'"
        description: "Drop database"
    expect: blocked
    tags: [destructive, database, DEC-005]

  - name: delete-without-where
    description: "DELETE FROM 無 WHERE 應該被擋住"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "psql -c 'DELETE FROM users'"
        description: "Delete all users"
    expect: blocked
    tags: [destructive, database, DEC-005]

  - name: safe-git-push-allowed
    description: "正常 git push 應該放行"
    hook_event: PreToolUse
    hook_matcher: Bash
    event_json:
      tool_name: Bash
      tool_input:
        command: "git push origin feature-branch"
        description: "Push feature branch"
    expect: allowed
    tags: [safe, git]
